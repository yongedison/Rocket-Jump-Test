<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prince Adventure</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
  
        <style>
    body { margin: 0; overflow: hidden; background: #5c94fc; font-family: sans-serif; touch-action: none; }
    #game-box { position: relative; width: 100vw; height: 100vh; }
    
    /* Tanah - Dinaikkan dikit biar nggak ketutupan tombol */
    #ground { position: absolute; bottom: 120px; width: 200%; height: 50px; background: #885010; border-top: 5px solid #4a2a05; }
    
    /* Pangeran - Ikut naik sama tanah */
    #player { 
        position: absolute; bottom: 170px; left: 50px; 
        font-size: 50px; width: 50px; height: 50px;
        display: flex; align-items: center; justify-content: center;
        z-index: 10;
    }

    /* Musuh (Penyihir) - Ikut naik */
    .witch { position: absolute; bottom: 170px; font-size: 40px; }

    /* Awan */
    .cloud { position: absolute; top: 50px; font-size: 40px; opacity: 0.6; }

    /* Kontrol - Dinaikkan biar nggak nabrak bar browser */
    #controls { 
        position: absolute; 
        bottom: 30px; /* Jarak aman dari paling bawah */
        width: 100%; 
        display: flex; 
        justify-content: center; 
        gap: 20px;
        z-index: 20;
    }
    .btn { 
        background: rgba(255,255,255,0.4); 
        padding: 15px; 
        border-radius: 50%;
        width: 60px; 
        height: 60px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        font-size: 1.8rem; 
        border: 2px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #score { position: absolute; top: 50px; left: 20px; font-size: 1.5rem; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
 </style>
</head>
<body>

<div id="game-box">
    <div id="score">Skor: 0</div>
    <div class="cloud" style="left: 10%;">☁️</div>
    <div class="cloud" style="left: 60%; top: 80px;">☁️</div>
    
    <div id="player">🤴</div>
    <div id="ground"></div>

    <div id="controls">
        <div class="btn" id="btn-left">⬅️</div>
        <div class="btn" id="btn-jump">🚀</div>
        <div class="btn" id="btn-right">➡️</div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    let posX = 50;
    let posY = 170; // Sesuaikan dengan posisi bottom player di CSS
// ... di dalam function update() ...
if (posY <= 170) {
    posY = 170;
    isJumping = false;
    velocityY = 0;
}

    let isJumping = false;
    let score = 0;
    let gameActive = true;

    // Setting Fisika
    const gravity = 1.2;
    const jumpPower = 18;
    const speed = 7;

    // Gerak Kiri Kanan
    let moveLeft = false;
    let moveRight = false;

    // Kontrol HP
    document.getElementById('btn-left').ontouchstart = () => moveLeft = true;
    document.getElementById('btn-left').ontouchend = () => moveLeft = false;
    document.getElementById('btn-right').ontouchstart = () => moveRight = true;
    document.getElementById('btn-right').ontouchend = () => moveRight = false;
    document.getElementById('btn-jump').ontouchstart = () => {
        if (!isJumping) {
            velocityY = jumpPower;
            isJumping = true;
        }
    };

    function spawnWitch() {
        if (!gameActive) return;
        const witch = document.createElement('div');
        witch.className = 'witch';
        witch.innerText = '🧙‍♀️';
        witch.style.right = '-50px';
        document.getElementById('game-box').appendChild(witch);

        let witchPos = -50;
        let witchInterval = setInterval(() => {
            if (!gameActive) { clearInterval(witchInterval); return; }
            
            witchPos += 5 + (score/5); // Makin lama makin cepet
            witch.style.right = witchPos + 'px';

            // Cek Tabrakan (Hitbox)
            let playerRect = player.getBoundingClientRect();
            let witchRect = witch.getBoundingClientRect();

            if (
                playerRect.right > witchRect.left &&
                playerRect.left < witchRect.right &&
                playerRect.bottom > witchRect.top
            ) {
                gameOver();
            }

            // Lolos musuh
            if (witchPos > window.innerWidth + 50) {
                clearInterval(witchInterval);
                witch.remove();
                score++;
                scoreElement.innerText = `Skor: ${score}`;
            }
        }, 20);
        
        setTimeout(spawnWitch, Math.random() * 2000 + 1000);
    }

    function update() {
        if (!gameActive) return;

        // Gravitasi
        velocityY -= gravity;
        posY += velocityY;

        if (posY <= 50) {
            posY = 50;
            isJumping = false;
            velocityY = 0;
        }

        // Gerakan Kiri/Kanan
        if (moveLeft && posX > 0) posX -= speed;
        if (moveRight && posX < window.innerWidth - 50) posX += speed;

        player.style.bottom = posY + 'px';
        player.style.left = posX + 'px';

        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        alert("Pangeran Tertangkap Penyihir! Skor kamu: " + score);
        location.reload();
    }

    update();
    spawnWitch();
</script>

</body>
</html>
