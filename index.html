<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Yong - Fixed</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: sans-serif; touch-action: none; }
        
        #world { position: absolute; height: 100vh; width: 10000px; }
        #ground { position: absolute; bottom: 0; width: 100%; height: 100px; background: #885010; border-top: 5px solid #4a2a05; }
        #player { position: absolute; width: 40px; height: 40px; font-size: 35px; z-index: 100; left: 50px; }
        
        /* Objek pakai class 'obj' agar mudah dideteksi kodingan */
        .obj { position: absolute; z-index: 10; }
        .block { background: #ff9441; border: 3px solid #000; box-shadow: inset -4px -4px 0 #885010; }
        .pipe { background: #2ecc71; border: 3px solid #000; border-radius: 8px 8px 0 0; }
        .enemy { z-index: 50; }
        
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 500; }
        .btn { background: rgba(255,255,255,0.4); width: 70px; height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="world">
    <div id="ground"></div>
    <div id="player">🤴</div>
    
    <div class="obj pipe" style="left: 400px; bottom: 100px; width: 60px; height: 70px;"></div>
    <div class="obj block" style="left: 600px; bottom: 250px; width: 120px; height: 40px;"></div>
    <div class="obj pipe" style="left: 900px; bottom: 100px; width: 60px; height: 100px;"></div>
    <div class="obj block" style="left: 1100px; bottom: 350px; width: 120px; height: 40px;"></div>
    <div class="enemy" style="left: 1400px; bottom: 100px; position: absolute;">👾</div>
</div>

<div id="controls">
    <div style="display:flex; gap:10px;">
        <div class="btn" id="l-btn">⬅️</div>
        <div class="btn" id="r-btn">➡️</div>
    </div>
    <div class="btn" id="j-btn" style="background:cyan; border-radius:50%;">🚀</div>
</div>

<script>
    const world = document.getElementById('world'), player = document.getElementById('player');
    let px = 50, py = 100, vy = 0, jmp = false;
    let mL = false, mR = false;
    const gravity = 0.8, jumpPower = 16, speed = 6;

    // Input iPhone
    const control = (id, act) => {
        const e = document.getElementById(id);
        e.ontouchstart = (ev) => { ev.preventDefault(); act(true); };
        e.ontouchend = (ev) => { ev.preventDefault(); act(false); };
    };
    control('l-btn', (v) => { mL = v; if(v) player.style.transform = 'scaleX(-1)'; });
    control('r-btn', (v) => { mR = v; if(v) player.style.transform = 'scaleX(1)'; });
    control('j-btn', (v) => { if(v && !jmp) { vy = jumpPower; jmp = true; } });

    function loop() {
        vy -= gravity;
        py += vy;

        // --- SISTEM PIJAKAN TERKUAT ---
        let onSomething = false;
        const objs = document.getElementsByClassName('obj');
        
        // Cek posisi player (kita ambil angka murninya)
        let pTop = window.innerHeight - py - 40; 
        let pBottom = window.innerHeight - py;
        let pLeft = px;
        let pRight = px + 40;

        for (let o of objs) {
            let oRect = o.getBoundingClientRect();
            // Kita hitung posisi objek terhadap dunia, bukan terhadap layar
            let oTop = oRect.top;
            let oLeft = oRect.left;
            let oRight = oRect.right;

            // Cek jika kaki pangeran ada di atas permukaan objek
            if (vy <= 0 && 
                pBottom >= oTop && pBottom <= oTop + 25 && 
                pRight > oLeft + 5 && pLeft < oRight - 5) {
                
                py = window.innerHeight - oTop; // Kunci posisi kaki
                vy = 0;
                jmp = false;
                onSomething = true;
                break;
            }
        }

        // Jika tidak di atas balok, cek tanah (100px)
        if (!onSomething && py <= 100) {
            py = 100;
            vy = 0;
            jmp = false;
        }

        // Gerak
        if (mL && px > 0) px -= speed;
        if (mR) px += speed;

        // Render (Penting: Gunakan Math.round agar tidak pecah/getar)
        player.style.bottom = Math.round(py) + "px";
        player.style.left = Math.round(px) + "px";
        
        // Kamera mengikuti player
        let camX = Math.max(0, px - 150);
        world.style.transform = `translateX(-${Math.round(camX)}px)`;

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
