<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prince Run - Pro Controls</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #5c94fc; font-family: -apple-system, sans-serif; 
            touch-action: none; width: 100vw; height: 100vh;
        }
        
        #ground { position: absolute; bottom: 180px; width: 100%; height: 40px; background: #885010; border-top: 4px solid #4a2a05; }
        
        #player { 
            position: absolute; width: 50px; height: 50px;
            font-size: 50px; display: flex; align-items: center; justify-content: center;
            z-index: 10; bottom: 220px; left: 50px;
        }

        .witch { position: absolute; bottom: 220px; font-size: 40px; z-index: 5; }
        #score { position: absolute; top: 60px; left: 20px; font-size: 1.8rem; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* AREA KONTROL BARU */
        #controls-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between; /* Pisahkan kiri dan kanan */
            padding: 0 30px;
            z-index: 100;
        }

        .move-group { display: flex; gap: 15px; } /* Grup tombol kiri */

        .btn { 
            background: rgba(255,255,255,0.3); 
            backdrop-filter: blur(5px);
            width: 80px; 
            height: 80px; 
            border-radius: 20px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 2.2rem; 
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.05s;
        }

        .btn:active { 
            background: rgba(255,255,255,0.8); 
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        #btn-jump { 
            background: rgba(0, 212, 255, 0.4);
            border-color: #00d4ff;
            width: 90px; /* Tombol loncat agak lebih besar biar gampang kena */
            height: 90px;
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="score">Skor: 0</div>
    <div id="player">🤴</div>
    <div id="ground"></div>

    <div id="controls-container">
        <div class="move-group">
            <div class="btn" id="btn-left">⬅️</div>
            <div class="btn" id="btn-right">➡️</div>
        </div>

        <div class="btn" id="btn-jump">🚀</div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    
    let posX = 50;
    let posY = 0; 
    let velocityY = 0;
    let isJumping = false;
    let score = 0;
    let gameActive = true;

    const gravity = 0.8;
    const jumpPower = 15;
    const speed = 6;

    let moveLeft = false;
    let moveRight = false;

    // Helper untuk Input
    const bindBtn = (id, start, end) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
    };

    bindBtn('btn-left', () => moveLeft = true, () => moveLeft = false);
    bindBtn('btn-right', () => moveRight = true, () => moveRight = false);
    bindBtn('btn-jump', () => { if(!isJumping) { velocityY = jumpPower; isJumping = true; } }, () => {});

    function spawnWitch() {
        if (!gameActive) return;
        const witch = document.createElement('div');
        witch.className = 'witch';
        witch.innerText = '🧙‍♀️';
        witch.style.left = window.innerWidth + 'px';
        document.getElementById('game-box').appendChild(witch);

        let witchX = window.innerWidth;
        let witchInterval = setInterval(() => {
            if (!gameActive) { clearInterval(witchInterval); witch.remove(); return; }
            witchX -= (5 + (score / 5)); 
            witch.style.left = witchX + 'px';

            let pRect = player.getBoundingClientRect();
            let wRect = witch.getBoundingClientRect();

            if (pRect.right > wRect.left + 15 && pRect.left < wRect.right - 15 && pRect.bottom > wRect.top + 10) {
                gameActive = false;
                alert("Game Over! Skor: " + score);
                location.reload();
            }

            if (witchX < -50) { clearInterval(witchInterval); witch.remove(); score++; scoreElement.innerText = `Skor: ${score}`; }
        }, 20);
        setTimeout(spawnWitch, Math.random() * 2000 + 1500);
    }

    function update() {
        if (!gameActive) return;
        if (isJumping || posY > 0) { velocityY -= gravity; posY += velocityY; }
        if (posY <= 0) { posY = 0; isJumping = false; velocityY = 0; }
        if (moveLeft && posX > 0) posX -= speed;
        if (moveRight && posX < window.innerWidth - 60) posX += speed;

        player.style.bottom = (220 + posY) + 'px';
        player.style.left = posX + 'px';
        requestAnimationFrame(update);
    }

    update();
    spawnWitch();
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>

</body>
</html>
