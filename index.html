<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yong vs Asti - No Canvas Edition</title>
    <style>
        :root { --yong: #00f2ff; --asti: #bf00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; height: 100vh; display: flex; flex-direction: column; }
        
        #game-world { position: relative; flex: 1; background: #050505; border-bottom: 2px solid #333; overflow: hidden; }
        #floor { position: absolute; bottom: 0; width: 100%; height: 5px; background: #222; }

        /* Karakter pakai DIV biasa, pasti muncul! */
        .char { position: absolute; width: 40px; height: 60px; transition: transform 0.05s linear; }
        #yong { background: var(--yong); box-shadow: 0 0 15px var(--yong); bottom: 5px; left: 50px; z-index: 5; }
        #asti { background: var(--asti); box-shadow: 0 0 15px var(--asti); bottom: 5px; right: 50px; z-index: 4; }
        
        /* Efek Tebasan */
        #slash { position: absolute; width: 50px; height: 50px; background: white; opacity: 0; pointer-events: none; border-radius: 50%; z-index: 6; }

        .hp-area { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; }
        .bar { width: 120px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .fill { height: 100%; width: 100%; transition: width 0.2s; }

        #controls { height: 200px; background: #111; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 10px; padding: 15px; }
        .btn { background: #222; border: 1px solid #444; border-radius: 15px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .atk { background: rgba(0, 242, 255, 0.2); border-color: var(--yong); color: var(--yong); grid-column: span 3; }
    </style>
</head>
<body>

<div id="game-world">
    <div class="hp-area">
        <div><div style="color:white; font-size:10px">YONG</div><div class="bar"><div id="yhp" class="fill" style="background: var(--yong)"></div></div></div>
        <div><div style="color:white; font-size:10px">ASTI</div><div class="bar"><div id="ahp" class="fill" style="background: var(--asti)"></div></div></div>
    </div>
    <div id="yong" class="char"></div>
    <div id="asti" class="char"></div>
    <div id="slash"></div>
    <div id="floor"></div>
</div>

<div id="controls">
    <div class="btn" id="lBtn">LEFT</div>
    <div class="btn" id="jBtn">JUMP</div>
    <div class="btn" id="rBtn">RIGHT</div>
    <div class="btn atk" id="aBtn">SLASH ATTACK</div>
</div>

<script>
    const yEl = document.getElementById('yong');
    const aEl = document.getElementById('asti');
    const sEl = document.getElementById('slash');
    const world = document.getElementById('game-world');

    let p = { x: 50, y: 0, v: 0, jump: false, hp: 100, side: 1 };
    let e = { x: 250, y: 0, hp: 100, lastS: 0 };
    let move = 0;

    function gameLoop() {
        // Yong Move
        p.x += move;
        if(p.x < 0) p.x = 0;
        if(p.x > world.clientWidth - 40) p.x = world.clientWidth - 40;

        // Yong Jump
        if(p.jump) {
            p.v -= 0.8;
            p.y += p.v;
            if(p.y <= 0) { p.y = 0; p.v = 0; p.jump = false; }
        }

        // Asti AI Simple
        let dist = p.x - e.x;
        if(Math.abs(dist) > 150) e.x += (dist > 0 ? 1 : -1);
        else if(Math.abs(dist) < 80) e.x += (dist > 0 ? -2 : 2);

        // Render
        yEl.style.transform = `translate(${p.x}px, ${-p.y}px)`;
        aEl.style.transform = `translateX(${e.x}px)`;

        requestAnimationFrame(gameLoop);
    }

    // Controls
    const btn = (id, start, end) => {
        const el = document.getElementById(id);
        el.ontouchstart = (ev) => { ev.preventDefault(); start(); };
        el.ontouchend = (ev) => { ev.preventDefault(); end(); };
    };

    btn('lBtn', () => { move = -5; p.side = -1; }, () => move = 0);
    btn('rBtn', () => { move = 5; p.side = 1; }, () => move = 0);
    btn('jBtn', () => { if(!p.jump){ p.v = 15; p.jump = true; }}, () => {});
    
    btn('aBtn', () => {
        // Visual Attack
        sEl.style.opacity = "0.8";
        let sx = p.x + (p.side === 1 ? 40 : -40);
        sEl.style.transform = `translate(${sx}px, ${-p.y}px)`;
        
        // Hit logic
        if(Math.abs(sx - e.x) < 50 && Math.abs(p.y - 0) < 60) {
            e.hp -= 10;
            document.getElementById('ahp').style.width = e.hp + "%";
            aEl.style.background = "white";
            setTimeout(() => { aEl.style.background = "var(--asti)"; e.x += (p.side * 50); }, 100);
        }
        
        setTimeout(() => sEl.style.opacity = "0", 100);
    }, () => {});

    gameLoop();
</script>
</body>
</html>
