<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yong vs Asti Fix</title>
    <style>
        :root { --yong: #00f2ff; --asti: #bf00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-top {
            position: fixed; top: 10px; width: 100%; display: flex;
            justify-content: space-around; pointer-events: none; z-index: 10;
        }
        .hp-bar { width: 120px; height: 10px; background: #222; border-radius: 5px; margin-top: 5px; overflow: hidden;}
        .hp-fill { height: 100%; width: 100%; transition: 0.2s; }
        #yong-hp { background: var(--yong); box-shadow: 0 0 10px var(--yong); }
        #asti-hp { background: var(--asti); box-shadow: 0 0 10px var(--asti); }
        .label { color: white; font-size: 10px; text-align: center; }

        #controls { 
            position: fixed; bottom: 20px; width: 100%; 
            display: flex; justify-content: space-evenly; align-items: center; z-index: 10;
        }
        .btn { 
            width: 65px; height: 65px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .attack-btn { border-color: var(--yong); color: var(--yong); width: 80px; height: 80px; }
    </style>
</head>
<body>

<div id="ui-top">
    <div>
        <div class="label">YONG</div>
        <div class="hp-bar"><div id="yong-hp" class="hp-fill"></div></div>
    </div>
    <div>
        <div class="label">ASTI</div>
        <div class="hp-bar"><div id="asti-hp" class="hp-fill"></div></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <div class="btn" id="lBtn">◄</div>
    <div class="btn" id="rBtn">►</div>
    <div class="btn" id="jBtn">UP</div>
    <div class="btn attack-btn" id="aBtn">SLASH</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // FIX: Ukuran canvas disesuaikan agar tidak tertutup tombol
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const floorY = canvas.height - 150; // Lantai di atas tombol

    const yong = { x: 50, y: floorY - 60, w: 30, h: 50, dx: 0, dy: 0, hp: 100, isJumping: false, isAtk: false, atkF: 0 };
    const asti = { x: canvas.width - 80, y: 200, w: 35, h: 55, hp: 100, dir: 1, lastS: 0, tele: false };
    const projectiles = [];

    function update() {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Lantai
        ctx.fillStyle = "#111";
        ctx.fillRect(0, floorY, canvas.width, canvas.height - floorY);
        ctx.strokeStyle = "#00f2ff";
        ctx.strokeRect(0, floorY, canvas.width, 1);

        // Physics Yong
        yong.dy += 0.6; // Gravity
        yong.y += yong.dy;
        yong.x += yong.dx;

        if (yong.y + yong.h > floorY) {
            yong.y = floorY - yong.h;
            yong.dy = 0;
            yong.isJumping = false;
        }

        // Asti Hovering
        if(!asti.tele) {
            asti.y += 1.5 * asti.dir;
            if(asti.y > floorY - 100 || asti.y < 50) asti.dir *= -1;
            
            // Asti nembak
            if(Date.now() - asti.lastS > 1800) {
                projectiles.push({x: asti.x, y: asti.y + 20});
                asti.lastS = Date.now();
            }
        }

        // Draw Yong
        ctx.fillStyle = "#00f2ff";
        ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
        ctx.fillRect(yong.x, yong.y, yong.w, yong.h);

        // Draw Slash
        if(yong.isAtk) {
            ctx.fillStyle = "white";
            ctx.fillRect(yong.x + yong.w, yong.y, 40, yong.h);
            yong.atkF++;
            if(yong.x + yong.w + 40 > asti.x && yong.x < asti.x + asti.w && yong.y < asti.y + asti.h && yong.y + yong.h > asti.y) {
                if(yong.atkF == 1) {
                    asti.hp -= 10;
                    asti.tele = true;
                    setTimeout(() => { 
                        asti.x = Math.random() * (canvas.width - 100) + 50; 
                        asti.tele = false; 
                    }, 100);
                }
            }
            if(yong.atkF > 5) { yong.isAtk = false; yong.atkF = 0; }
        }

        // Draw Asti
        if(!asti.tele) {
            ctx.fillStyle = "#bf00ff";
            ctx.shadowColor = "#bf00ff";
            ctx.fillRect(asti.x, asti.y, asti.w, asti.h);
        }

        // Projectiles
        projectiles.forEach((p, i) => {
            p.x -= 6;
            ctx.fillStyle = "magenta";
            ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill();
            if(p.x < yong.x + yong.w && p.x > yong.x && p.y > yong.y && p.y < yong.y + yong.h) {
                yong.hp -= 10;
                projectiles.splice(i, 1);
            }
            if(p.x < 0) projectiles.splice(i, 1);
        });

        document.getElementById('yong-hp').style.width = yong.hp + "%";
        document.getElementById('asti-hp').style.width = asti.hp + "%";

        if(yong.hp <= 0 || asti.hp <= 0) { alert(yong.hp <= 0 ? "Kalah!" : "Menang!"); location.reload(); return; }

        ctx.shadowBlur = 0;
        requestAnimationFrame(update);
    }

    // Controls Fix
    const b = (id, f) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); f(true); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); f(false); });
    }

    b('lBtn', (v) => yong.dx = v ? -5 : 0);
    b('rBtn', (v) => yong.dx = v ? 5 : 0);
    b('jBtn', (v) => { if(v && !yong.isJumping) { yong.dy = -12; yong.isJumping = true; }});
    b('aBtn', (v) => { if(v) yong.isAtk = true; });

    update();
</script>
</body>
</html>
