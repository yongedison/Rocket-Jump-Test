<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Yong World</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; overflow: hidden; background: #5c94fc; font-family: 'Arial', sans-serif; touch-action: none; }
        
        /* Menu */
        #menu { position: fixed; inset: 0; background: #5c94fc; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-start { padding: 15px 40px; font-size: 1.5rem; background: #ff9441; border: 4px solid white; color: white; border-radius: 10px; font-weight: bold; box-shadow: 0 5px 0 #885010; }

        /* Game Area */
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: none; }
        #world { position: absolute; top: 0; left: 0; height: 100%; width: 10000px; }
        #ground { position: absolute; bottom: 0; width: 10000px; height: 100px; background: #885010; border-top: 6px solid #4a2a05; }
        
        /* Objek */
        #player { position: absolute; width: 40px; height: 40px; font-size: 35px; z-index: 100; bottom: 100px; left: 100px; display: flex; align-items: center; justify-content: center; }
        .block { position: absolute; background: #ff9441; border: 3px solid #000; box-shadow: inset -4px -4px 0 #885010; z-index: 10; }
        .pipe { position: absolute; background: #2ecc71; width: 70px; border: 3px solid #000; z-index: 9; border-radius: 5px 5px 0 0; bottom: 100px; }
        .pipe::after { content: ''; position: absolute; top: 0; left: -5px; width: 74px; height: 20px; background: #2ecc71; border: 3px solid #000; border-radius: 3px; }
        .coin { position: absolute; font-size: 25px; z-index: 8; text-align: center; }
        .enemy { position: absolute; bottom: 100px; font-size: 30px; width: 40px; height: 40px; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .flag { position: absolute; bottom: 100px; font-size: 60px; z-index: 5; }

        /* UI */
        #ui { position: fixed; top: 40px; left: 20px; color: white; font-size: 1.2rem; font-weight: bold; z-index: 500; text-shadow: 2px 2px #000; }
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 500; }
        .btn { background: rgba(255,255,255,0.4); width: 70px; height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 3px solid white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        #btn-jump { background: rgba(0,212,255,0.5); width: 85px; height: 85px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 2.5rem; text-align: center; margin-bottom: 10px;">SUPER YONG<br>WORLD</h1>
    <p>Record: <span id="hi-score">0</span></p>
    <button class="btn-start" onclick="startGame()">MASUK LEVEL 1-1</button>
</div>

<div id="viewport">
    <div id="ui">🪙 <span id="coins">0</span> | Score: <span id="score">0</span></div>
    <div id="world">
        <div id="ground"></div>
        <div id="player">🤴</div>
        
        <div class="pipe" style="left: 450px; height: 60px;"></div>
        <div class="block" style="bottom: 250px; left: 600px; width: 40px; height: 40px;"></div>
        <div class="coin" style="bottom: 300px; left: 605px;">💰</div>
        <div class="block" style="bottom: 250px; left: 640px; width: 40px; height: 40px;"></div>
        
        <div class="enemy" data-id="1" style="left: 900px;">👾</div>
        <div class="pipe" style="left: 1100px; height: 100px;"></div>
        
        <div class="block" style="bottom: 220px; left: 1400px; width: 200px; height: 30px;"></div>
        <div class="coin" style="bottom: 260px; left: 1450px;">💰</div>
        <div class="coin" style="bottom: 260px; left: 1520px;">💰</div>
        
        <div class="enemy" data-id="2" style="left: 1800px;">👾</div>
        <div class="enemy" data-id="3" style="left: 2100px;">👾</div>
        
        <div class="block" style="bottom: 250px; left: 2400px; width: 80px; height: 40px;"></div>
        <div class="block" style="bottom: 350px; left: 2550px; width: 80px; height: 40px;"></div>
        <div class="block" style="bottom: 450px; left: 2700px; width: 80px; height: 40px;"></div>
        <div class="coin" style="bottom: 500px; left: 2725px;">💰</div>

        <div class="flag" style="left: 4000px;">🚩</div>
    </div>

    <div id="controls">
        <div style="display: flex; gap: 15px;">
            <div class="btn" id="btn-left">⬅️</div>
            <div class="btn" id="btn-right">➡️</div>
        </div>
        <div class="btn" id="btn-jump">🚀</div>
    </div>
</div>

<script>
    const world = document.getElementById('world');
    const player = document.getElementById('player');
    const scoreText = document.getElementById('score');
    const coinText = document.getElementById('coins');
    const hiScoreText = document.getElementById('hi-score');

    let pX = 100, pY = 0, vY = 0, isJump = false;
    let score = 0, coins = 0, gameActive = false;
    let moveL = false, moveR = false;
    
    const gravity = 0.8, jumpPower = 17, speed = 6;
    let enemyList = [];

    // Load High Score
    let savedHi = localStorage.getItem('yongHi') || 0;
    hiScoreText.innerText = savedHi;

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('viewport').style.display = 'block';
        initEnemies();
        gameActive = true;
        update();
    }

    function initEnemies() {
        document.querySelectorAll('.enemy').forEach(el => {
            enemyList.push({ el: el, x: parseInt(el.style.left), dir: -1, dead: false });
        });
    }

    // Controls
    const setup = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };
    setup('btn-left', () => { moveL = true; player.style.transform = 'scaleX(-1)'; }, () => moveL = false);
    setup('btn-right', () => { moveR = true; player.style.transform = 'scaleX(1)'; }, () => moveR = false);
    setup('btn-jump', () => { if(!isJump) { vY = jumpPower; isJump = true; } }, () => {});

    function update() {
        if(!gameActive) return;

        // Gravitasi
        vY -= gravity;
        pY += vY;

        let pRect = player.getBoundingClientRect();
        let onObj = false;

        // FIXED COLLISION (Anti-Mantul)
        document.querySelectorAll('.block, .pipe').forEach(obj => {
            let oR = obj.getBoundingClientRect();
            // Cek jika mendarat tepat di atas
            if (vY <= 0 && pRect.bottom >= oR.top && pRect.bottom <= oR.top + 20 &&
                pRect.right > oR.left + 5 && pRect.left < oR.right - 5) {
                pY = window.innerHeight - oR.top - 40; // 40 = tinggi player
                vY = 0;
                isJump = false;
                onObj = true;
            }
        });

        // Cek Tanah
        if(!onObj && pY <= 0) { pY = 0; vY = 0; isJump = false; }

        // Gerak Player
        if(moveL && pX > 0) pX -= speed;
        if(moveR) pX += speed;

        // Camera Follow
        let camX = Math.max(0, pX - 150);
        world.style.transform = `translateX(-${camX}px)`;
        player.style.left = pX + 'px';
        player.style.bottom = (100 + pY) + 'px';

        // Update Musuh (Jalan Otomatis)
        enemyList.forEach(en => {
            if(en.dead) return;
            en.x += (en.dir * 2);
            en.el.style.left = en.x + 'px';
            
            // Balik arah sederhana (tiap rute tertentu)
            if(Math.random() < 0.01) en.dir *= -1;

            let eR = en.el.getBoundingClientRect();
            if(pRect.right > eR.left + 5 && pRect.left < eR.right - 5 && pRect.bottom > eR.top) {
                if(vY < 0) { // Injak Musuh
                    en.dead = true;
                    en.el.innerText = '💥';
                    setTimeout(() => en.el.remove(), 200);
                    vY = 12; // Mental ke atas
                    score += 100;
                    scoreText.innerText = score;
                } else { gameOver(); } // Nabrak samping
            }
        });

        // Ambil Koin
        document.querySelectorAll('.coin').forEach(c => {
            let cR = c.getBoundingClientRect();
            if(pRect.right > cR.left && pRect.left < cR.right && pRect.bottom > cR.top && pRect.top < cR.bottom) {
                c.remove(); coins++; score += 50;
                coinText.innerText = coins; scoreText.innerText = score;
            }
        });

        // Finish
        if(pX > 4000) { gameActive = false; alert("LEVEL CLEAR! Skor: " + score); location.reload(); }

        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        if(score > savedHi) localStorage.setItem('yongHi', score);
        alert("GAME OVER!\nScore: " + score);
        location.reload();
    }

    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>
</body>
</html>
