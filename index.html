<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Yong World - Anti-Bouncing</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: sans-serif; touch-action: none; }
        #menu { position: fixed; inset: 0; background: #5c94fc; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-start { padding: 15px 40px; font-size: 1.5rem; background: #ff9441; border: 4px solid white; color: white; border-radius: 10px; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; display: none; }
        #world { position: absolute; top: 0; left: 0; height: 100%; width: 5000px; }
        #ground { position: absolute; bottom: 0; width: 100%; height: 100px; background: #885010; border-top: 5px solid #4a2a05; }
        
        #player { position: absolute; width: 40px; height: 40px; font-size: 35px; z-index: 100; bottom: 100px; left: 100px; }
        .block { position: absolute; background: #ff9441; border: 3px solid #000; z-index: 10; }
        .pipe { position: absolute; background: #2ecc71; width: 60px; border: 3px solid #000; border-radius: 5px 5px 0 0; bottom: 100px; z-index: 9; }
        .coin { position: absolute; font-size: 25px; z-index: 8; }
        
        #ui { position: fixed; top: 40px; left: 20px; color: white; font-weight: bold; z-index: 500; text-shadow: 2px 2px #000; }
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 500; }
        .btn { background: rgba(255,255,255,0.4); width: 70px; height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid white; }
    </style>
</head>
<body>

<div id="menu">
    <h1>SUPER YONG WORLD</h1>
    <button class="btn-start" onclick="startGame()">START</button>
</div>

<div id="viewport">
    <div id="ui">🪙 <span id="coins">0</span> | Score: <span id="score">0</span></div>
    <div id="world">
        <div id="ground"></div>
        <div id="player">🤴</div>
        
        <div class="pipe" data-x="400" data-y="70" style="left:400px; height:70px;"></div>
        <div class="block" data-x="650" data-y="180" data-w="120" style="left:650px; bottom:280px; width:120px; height:40px;"></div>
        <div class="block" data-x="900" data-y="280" data-w="120" style="left:900px; bottom:380px; width:120px; height:40px;"></div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="left">⬅️</div>
            <div class="btn" id="right">➡️</div>
        </div>
        <div class="btn" id="jump" style="background:cyan; border-radius:50%;">🚀</div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
    }

    const player = document.getElementById('player');
    const world = document.getElementById('world');
    const platforms = []; // Kita simpan data koordinat di sini

    let pX = 100, pY = 0, vY = 0, isJumping = false;
    let moveL = false, moveR = false;
    let score = 0, coins = 0;
    const gravity = 0.8, jumpPower = 16, speed = 6;

    function startGame() {
        audioCtx.resume();
        document.getElementById('menu').style.display = 'none';
        document.getElementById('viewport').style.display = 'block';
        
        // Simpan semua koordinat objek ke array agar deteksi lancar
        document.querySelectorAll('.pipe, .block').forEach(el => {
            platforms.push({
                x: parseInt(el.getAttribute('data-x')),
                y: parseInt(el.getAttribute('data-y')),
                w: parseInt(el.getAttribute('data-w') || 60),
                el: el
            });
        });
        update();
    }

    // Input
    const listen = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };
    listen('left', () => { moveL = true; player.style.transform = 'scaleX(-1)'; }, () => moveL = false);
    listen('right', () => { moveR = true; player.style.transform = 'scaleX(1)'; }, () => moveR = false);
    listen('jump', () => { if(!isJumping) { vY = jumpPower; isJumping = true; playSfx(400, 'square', 0.2); } }, () => {});

    function update() {
        vY -= gravity;
        pY += vY;

        let onObject = false;

        // DETEKSI PIJAKAN (Matematika Murni, bukan getBoundingClientRect)
        for (let plat of platforms) {
            // Cek apakah player di atas platform secara horizontal
            if (pX + 35 > plat.x && pX < plat.x + plat.w) {
                // Cek apakah player mendarat (vY <= 0) dan posisi kaki pas di atas platform
                if (vY <= 0 && pY >= plat.y && pY <= plat.y + 15) {
                    pY = plat.y; // Kunci posisi kaki tepat di permukaan
                    vY = 0;
                    isJumping = false;
                    onObject = true;
                    break;
                }
            }
        }

        // Cek Tanah Dasar
        if (!onObject && pY <= 0) {
            pY = 0; vY = 0; isJumping = false;
        }

        if (moveL && pX > 0) pX -= speed;
        if (moveR) pX += speed;

        // Render Posisi
        player.style.left = pX + 'px';
        player.style.bottom = (100 + pY) + 'px'; // 100 adalah tinggi tanah

        // Kamera Follow
        let camX = Math.max(0, pX - 150);
        world.style.transform = `translateX(-${camX}px)`;

        requestAnimationFrame(update);
    }

    document.addEventListener('touchmove', e => e.preventDefault(), {passive:false});
</script>
</body>
</html>
