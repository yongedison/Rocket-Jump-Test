<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prince Run</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #5c94fc; 
            font-family: -apple-system, sans-serif; 
            touch-action: none; /* Kunci layar biar nggak geser-geser */
        }
        #game-box { position: relative; width: 100vw; height: 100vh; }
        
        /* Tanah */
        #ground { 
            position: absolute; 
            bottom: 120px; 
            width: 100%; 
            height: 40px; 
            background: #885010; 
            border-top: 4px solid #4a2a05; 
        }
        
        /* Pangeran */
        #player { 
            position: absolute; 
            bottom: 160px; 
            left: 50px; 
            font-size: 50px; 
            width: 50px; 
            height: 50px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 10;
        }

        /* Penyihir */
        .witch { position: absolute; bottom: 160px; font-size: 40px; z-index: 5; }

        /* Kontrol - Area Aman iPhone */
        #controls { 
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            gap: 25px;
            z-index: 100;
        }
        .btn { 
            background: rgba(255,255,255,0.5); 
            width: 70px; 
            height: 70px; 
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 2rem; 
            border: 3px solid white;
            user-select: none;
            -webkit-user-select: none;
        }

        #score { 
            position: absolute; 
            top: 50px; 
            left: 20px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="score">Skor: 0</div>
    <div id="player">🤴</div>
    <div id="ground"></div>

    <div id="controls">
        <div class="btn" id="btn-left">⬅️</div>
        <div class="btn" id="btn-jump">🚀</div>
        <div class="btn" id="btn-right">➡️</div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const scoreElement = document.getElementById('score');
    
    // Posisi awal
    let posX = 50;
    let posY = 160; 
    let velocityY = 0;
    let isJumping = false;
    let score = 0;
    let gameActive = true;

    // Fisika
    const gravity = 1.0;
    const jumpPower = 16;
    const speed = 6;

    let moveLeft = false;
    let moveRight = false;

    // Fungsi Gerak (Touch Start)
    document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft = true; });
    document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight = true; });
    document.getElementById('btn-jump').addEventListener('touchstart', (e) => { 
        e.preventDefault();
        if (!isJumping) {
            velocityY = jumpPower;
            isJumping = true;
        }
    });

    // Fungsi Berhenti (Touch End)
    document.getElementById('btn-left').addEventListener('touchend', () => moveLeft = false);
    document.getElementById('btn-right').addEventListener('touchend', () => moveRight = false);

    function spawnWitch() {
        if (!gameActive) return;
        const witch = document.createElement('div');
        witch.className = 'witch';
        witch.innerText = '🧙‍♀️';
        witch.style.left = window.innerWidth + 'px';
        document.getElementById('game-box').appendChild(witch);

        let witchX = window.innerWidth;
        let witchInterval = setInterval(() => {
            if (!gameActive) { clearInterval(witchInterval); return; }
            
            witchX -= (4 + (score / 5)); 
            witch.style.left = witchX + 'px';

            // Cek Tabrakan
            let pRect = player.getBoundingClientRect();
            let wRect = witch.getBoundingClientRect();

            if (pRect.right > wRect.left + 10 && pRect.left < wRect.right - 10 && pRect.bottom > wRect.top + 10) {
                gameOver();
            }

            if (witchX < -50) {
                clearInterval(witchInterval);
                witch.remove();
                score++;
                scoreElement.innerText = `Skor: ${score}`;
            }
        }, 20);
        
        setTimeout(spawnWitch, Math.random() * 2000 + 1000);
    }

    function update() {
        if (!gameActive) return;

        // Loncat & Gravitasi
        velocityY -= gravity;
        posY -= velocityY; // Di CSS 'bottom' bertambah artinya naik

        if (posY >= 160) {
            posY = 160;
            isJumping = false;
            velocityY = 0;
        }

        // Geser Kiri Kanan
        if (moveLeft && posX > 0) posX -= speed;
        if (moveRight && posX < window.innerWidth - 50) posX += speed;

        player.style.top = posY + 'px'; // Kita pakai 'top' biar lebih stabil di update
        player.style.left = posX + 'px';

        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        alert("Game Over! Skor kamu: " + score);
        location.reload();
    }

    update();
    spawnWitch();
</script>

</body>
</html>
